<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mTabula | 霍尔阵列测试</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./hall-test.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">mTabula <span>Hall Test</span></div>
    <nav>
      <a href="./index.html">首页</a>
      <a href="./gamespace.html">游戏空间</a>
      <a href="./pid.html">PID 管理</a>
    </nav>
  </header>

  <main class="shell">
    <section class="card controls">
      <h1>霍尔传感器阵列测试</h1>
      <p class="muted">后端地址固定使用当前页面的 <code>window.location.origin</code>。</p>

      <div class="grid">
        <label>Product ID
          <input id="productId" value="MBP1SCNEA2603000001" />
        </label>
        <label>检测行数 (Rows)
          <input id="rows" type="number" min="1" max="128" value="10" readonly />
        </label>
        <label>检测列数 (Cols)
          <input id="cols" type="number" min="1" max="128" value="11" readonly />
        </label>
        <label>请求路径
          <input id="apiPath" value="/api/boards/{productId}/hall-latest" />
        </label>
        <label>关闭颜色
          <input id="offColor" type="color" value="#1f2a40" />
        </label>
        <label>激活颜色
          <input id="onColor" type="color" value="#2ad4a7" />
        </label>
        <label>前端轮询间隔 (ms)
          <input id="intervalMs" type="number" min="100" max="10000" value="500" />
        </label>
        <label>ESP 上报间隔 (ms)
          <input id="espHallIntervalMs" type="number" min="100" max="60000" value="5000" />
        </label>
      </div>

      <div class="actions">
        <button id="buildBtn">生成网格</button>
        <button id="scanOnceBtn" class="ghost">扫描一次</button>
        <button id="startBtn">开始轮询</button>
        <button id="stopBtn" class="ghost">停止轮询</button>
        <button id="applyEspIntervalBtn" class="ghost">下发 ESP 间隔</button>
      </div>

      <p id="statusLine" class="muted"></p>

      <section class="payload-panel payload-left">
        <h3>ESP32 最新报文</h3>
        <pre id="payloadText">{}</pre>
      </section>
    </section>

    <section class="card board-card">
      <div class="meta">
        <div>模式：<strong id="metaMode">-</strong></div>
        <div>激活数：<strong id="metaActive">0</strong></div>
        <div>最大值：<strong id="metaMax">0</strong></div>
      </div>
      <div class="board-main">
        <div id="hallGrid" class="hall-grid"></div>
      </div>
    </section>
  </main>

  <script src="./hall-test.js"></script>
</body>
</html>
